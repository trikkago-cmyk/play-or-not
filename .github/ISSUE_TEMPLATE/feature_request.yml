name: Feature request
description: Propose a new feature, product direction, or implementation improvement.
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What user or product problem is this addressing?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: Describe the user-visible result, not only the implementation.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: What would make this feature clearly "done"?
      placeholder: |
        - User can ...
        - System returns ...
        - We can verify this by ...
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Main area
      options:
        - frontend
        - recommendation
        - referee
        - rag
        - tts
        - stt
        - auth
        - infra
        - docs
    validations:
      required: true
  - type: textarea
    id: risks
    attributes:
      label: Risks or tradeoffs
      description: Optional, but helpful for architecture and prioritization.
